<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレジットカード消費分析 2025〜2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #2d3436;
    --sub: #636e72;
    --border: #e9ecef;
    --accent: #6c5ce7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text); }
  header { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; padding: 24px 32px; }
  header h1 { font-size: 1.6rem; font-weight: 700; }
  header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
  .container { max-width: 1300px; margin: 0 auto; padding: 24px 20px; }
  
  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .kpi .label { font-size: 0.78rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi .value { font-size: 1.7rem; font-weight: 700; color: var(--text); margin: 6px 0 2px; }
  .kpi .unit { font-size: 0.8rem; color: var(--sub); }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
  .charts-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .chart-wrap { position: relative; height: 300px; }
  .chart-wrap-tall { position: relative; height: 380px; }
  .chart-wrap-sm { position: relative; height: 260px; }

  /* Tab */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 0.82rem; cursor: pointer; background: var(--bg); color: var(--sub); }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Table */
  .table-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
  .table-controls { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .table-controls input, .table-controls select {
    padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 0.85rem; background: var(--bg); color: var(--text);
  }
  .table-controls input { flex: 1; min-width: 180px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  th { background: var(--bg); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--sub); border-bottom: 2px solid var(--border); }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f0f3ff; }
  .amount { text-align: right; font-weight: 600; }
  .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; color: white; }
  .pagination { display: flex; gap: 8px; margin-top: 14px; align-items: center; justify-content: flex-end; font-size: 0.85rem; }
  .page-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: var(--bg); }
  .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Legend */
  .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 6px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 768px) {
    .charts-row, .charts-row2 { grid-template-columns: 1fr; }
    header h1 { font-size: 1.3rem; }
    .kpi .value { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<header>
  <h1>💳 クレジットカード消費分析ダッシュボード</h1>
  <p>CTBC（中信）カード ／ 2025年1月〜2026年2月（14ヶ月）</p>
</header>

<div class="container">

  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Row 1: Monthly bar + Category donut -->
  <div class="charts-row">
    <div class="card">
      <h2>📅 月次支出推移</h2>
      <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
    </div>
    <div class="card">
      <h2>🍩 カテゴリ別割合</h2>
      <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
    </div>
  </div>

  <!-- Row 2: Stacked + Trend -->
  <div class="charts-row">
    <div class="card">
      <h2>📊 カテゴリ別月次推移（積み上げ）</h2>
      <div class="chart-wrap-tall"><canvas id="stackedChart"></canvas></div>
    </div>
    <div class="card">
      <h2>📈 主要カテゴリ推移（折れ線）</h2>
      <div class="chart-wrap-tall"><canvas id="lineChart"></canvas></div>
    </div>
  </div>

  <!-- Row 3: Category bar -->
  <div class="card" style="margin-bottom:20px">
    <h2>💰 カテゴリ別年間合計（TWD）</h2>
    <div class="chart-wrap"><canvas id="categoryBar"></canvas></div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <h2 style="margin-bottom:14px">🔍 明細一覧</h2>
    <div class="table-controls">
      <input type="text" id="searchInput" placeholder="加盟店名・カテゴリで検索...">
      <select id="catFilter"><option value="">すべてのカテゴリ</option></select>
      <select id="monthFilter"><option value="">すべての月</option></select>
      <span id="recordCount" style="font-size:0.82rem;color:var(--sub)"></span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>消費日</th><th>帳票月</th><th>加盟店</th><th>カテゴリ</th>
          <th>消費国</th><th class="amount">金額（TWD）</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

const catSorted = categories.filter(c => RAW_DATA.cat_total[c] > 0)
  .sort((a,b) => (RAW_DATA.cat_total[b]||0)-(RAW_DATA.cat_total[a]||0));
new Chart(document.getElementById('donutChart'), {
  type: 'doughnut',
  data: {
    labels: catSorted,
    datasets: [{
      data: catSorted.map(c => RAW_DATA.cat_total[c]||0),
      backgroundColor: catSorted.map(c => CAT_COLORS[c]||'#ccc'),
      borderWidth: 2, borderColor: '#fff'
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: {
        label: ctx => ` ${ctx.label}: ${ctx.raw.toLocaleString()} TWD (${(ctx.raw/RAW_DATA.grand_total*100).toFixed(1)}%)`
      } }
    },
    cutout: '60%'
  }
});

// Stacked bar
const topCats = catSorted.slice(0, 10);
new Chart(document.getElementById('stackedChart'), {
  type: 'bar',
  data: {
    labels: monthLabels,
    datasets: topCats.map(c => ({
      label: c,
      data: months.map(m => (RAW_DATA.cat_month[c]||{})[m]||0),
      backgroundColor: CAT_COLORS[c]||'#ccc',
      borderWidth: 0,
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { stacked: true, grid: { display: false } },
      y: { stacked: true, grid: { color: '#f0f0f0' }, ticks: { callback: v => v.toLocaleString() } }
    }
  }
});

// Line chart - top 5 categories
const line5 = catSorted.slice(0, 6);
new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: monthLabels,
    datasets: line5.map(c => ({
      label: c,
      data: months.map(m => (RAW_DATA.cat_month[c]||{})[m]||0),
      borderColor: CAT_COLORS[c]||'#ccc',
      backgroundColor: 'transparent',
      tension: 0.3, pointRadius: 4, borderWidth: 2,
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } } },
    scales: {
      x: { grid: { display: false } },
      y: { grid: { color: '#f0f0f0' }, ticks: { callback: v => v.toLocaleString() } }
    }
  }
});

// Category horizontal bar
const catBar = [...catSorted];
new Chart(document.getElementById('categoryBar'), {
  type: 'bar',
  data: {
    labels: catBar,
    datasets: [{
      data: catBar.map(c => RAW_DATA.cat_total[c]||0),
      backgroundColor: catBar.map(c => CAT_COLORS[c]||'#ccc'),
      borderRadius: 4,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      callbacks: { label: ctx => ` ${ctx.raw.toLocaleString()} TWD (${RAW_DATA.cat_count[ctx.label]}件)` }
    } },
    scales: {
      x: { grid: { color: '#f0f0f0' }, ticks: { callback: v => v.toLocaleString() } },
      y: { grid: { display: false } }
    }
  }
});

// Table
const catFilter = document.getElementById('catFilter');
const monthFilter = document.getElementById('monthFilter');
categories.filter(c=>RAW_DATA.cat_total[c]>0)
  .sort((a,b)=>(RAW_DATA.cat_total[b]||0)-(RAW_DATA.cat_total[a]||0))
  .forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    catFilter.appendChild(o);
  });
months.forEach(m => {
  const o = document.createElement('option');
  o.value = m; o.textContent = m;
  monthFilter.appendChild(o);
});

let currentPage = 1;
const PER_PAGE = 25;

function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = catFilter.value;
  const month = monthFilter.value;
  return txs.filter(t =>
    (!search || t.merchant.toLowerCase().includes(search) || t.category.includes(search)) &&
    (!cat || t.category === cat) &&
    (!month || t.statement_month === month)
  ).sort((a,b) => b.tx_date.localeCompare(a.tx_date));
}

function renderTable() {
  const filtered = getFiltered();
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  currentPage = Math.min(currentPage, pages || 1);
  const start = (currentPage-1)*PER_PAGE;
  const slice = filtered.slice(start, start+PER_PAGE);

  document.getElementById('recordCount').textContent = `${total.toLocaleString()}件`;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = slice.map(t => {
    const color = CAT_COLORS[t.category]||'#636e72';
    return `<tr>
      <td>${t.tx_date}</td>
      <td>${t.statement_month}</td>
      <td>${t.merchant}</td>
      <td><span class="cat-badge" style="background:${color}">${t.category}</span></td>
      <td>${t.country}</td>
      <td class="amount">${t.amount_twd.toLocaleString()}</td>
    </tr>`;
  }).join('');

  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let html = `<span style="color:var(--sub)">${start+1}–${Math.min(start+PER_PAGE,total)} / ${total}</span>`;
  for (let i=1; i<=pages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pag.innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); }

['searchInput','catFilter','monthFilter'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { currentPage=1; renderTable(); });
});
renderTable();
</script>
</body>
</html>
